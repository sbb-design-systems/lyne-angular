<sbb-header expanded>
  <span class="sbb-header-info sbb-text-m">
    <strong>Lyne Angular</strong>
    <span class="sbb-text-xxs">{{version}}</span>
  </span>
  <sbb-header-link
    routerLink="/introduction"
    routerLinkActive="sbb-active"
    iconName="circle-information-small"
  >
    Introduction
  </sbb-header-link>
  <div class="sbb-header-spacer"></div>
  <sbb-header-button
    [iconName]="lightDarkController.isDarkMode() ? 'sunshine-small' : 'moon-small'"
    (click)="lightDarkController.toggle()"
    sbb-tooltip="Change to {{ lightDarkController.isDarkMode() ? 'light' : 'dark' }} theme"
  ></sbb-header-button>
  <sbb-header-button [expandFrom]="'small'" iconName="colour-palette-brush-small" #themeTrigger>
    {{ themeSwitch.themeName() }}
  </sbb-header-button>
  <sbb-menu [trigger]="themeTrigger">
    @for (entry of themeSwitch.themeEntries; track entry[0]){
    <sbb-menu-button
      [iconName]="themeSwitch.theme() === entry[0] ? 'tick-small' : null!"
      (click)="themeSwitch.setTheme(entry[0])"
    >
      {{ entry[1] }}
    </sbb-menu-button>
    }
  </sbb-menu>
  <a href="/" class="sbb-header-logo">
    <sbb-logo protectiveRoom="none"></sbb-logo>
  </a>
</sbb-header>
<sbb-icon-sidebar-container>
  <sbb-icon-sidebar color="milk">
    @for (packageEntry of packages | keyvalue; track $index) {
    <sbb-icon-sidebar-link
      [iconName]="packageEntry.value['svgIcon']"
      [routerLink]="packageEntry.key"
      routerLinkActive="sbb-active"
      [style.text-decoration]="packageEntry.value['isDeprecated'] ? 'line-through' : ''"
      [sbb-tooltip]="packageEntry.value['name']"
      [accessibilityLabel]="packageEntry.value['name']"
    >
    </sbb-icon-sidebar-link>
    }
  </sbb-icon-sidebar>
  <sbb-icon-sidebar-content role="main" sbb-header-scroll-origin>
    <router-outlet />
  </sbb-icon-sidebar-content>
</sbb-icon-sidebar-container>
