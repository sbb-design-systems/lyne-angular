<button
  class="sbb-cdn-icon__icon-wrapper"
  [class.sbb-cdn-icon__icon-wrapper-dark]="cdnIcon().tags.includes('dark')"
>
  <sbb-icon [name]="cdnIconPath" [class.sbb-cdn-icon__icon-fit]="iconFit()"></sbb-icon>
</button>
<span class="sbb-cdn-icon__icon-path" [sbb-tooltip]="cdnIconPath" sbb-tooltip-position="block-end">
  {{ cdnIconPath }}
</span>
