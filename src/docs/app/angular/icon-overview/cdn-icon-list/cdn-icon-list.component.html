<form class="sbb-controls-table">
  <label for="fulltext">Fulltext Filter</label>
  <sbb-form-field id="fulltext">
    <input [formField]="filterForm.fulltext" />
  </sbb-form-field>

  <label for="namespaces">Namespaces</label>
  <sbb-form-field id="namespaces">
    <sbb-select placeholder="Namespaces" [formField]="filterForm.namespaces" multiple>
      @for (namespace of namespaces; track namespace) {
        <sbb-option [value]="namespace">
          {{ namespace }}
        </sbb-option>
      }
    </sbb-select>
  </sbb-form-field>
</form>

@if (filteredIcons().length > 0) {
  <div class="cdn-icon-list-items">
    @for (cdnIcon of filteredIcons(); track cdnIcon.name) {
      <sbb-cdn-icon [cdnIcon]="cdnIcon" />
    }
  </div>

  <sbb-paginator
    [pageSize]="pageSize"
    (page)="handlePageChange($event)"
    aria-label="Select icon page"
  />
}

<p>
  Icon CDN Version: {{ cdnIcons().iconVersion }}<br />
  Picto CDN Version: {{ cdnIcons().pictoVersion }}<br />
</p>
