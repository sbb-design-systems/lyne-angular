<sbb-dialog-title>
  {{ cdnIconPath() }}
</sbb-dialog-title>
<sbb-dialog-content>
  <sbb-icon [name]="cdnIconPath()" class="cdn-icon-dialog-icon" />

  <sbb-title level="5">Code</sbb-title>
  <code>&lt;sbb-icon name="{{ cdnIconPath() }}"&gt;&lt;/sbb-icon&gt;</code>

  <sbb-title level="5">Tags</sbb-title>
  <p>{{ tags() }}</p>
</sbb-dialog-content>
<sbb-dialog-actions>
  <sbb-secondary-button sbb-dialog-close="cancel">Close</sbb-secondary-button>
</sbb-dialog-actions>
