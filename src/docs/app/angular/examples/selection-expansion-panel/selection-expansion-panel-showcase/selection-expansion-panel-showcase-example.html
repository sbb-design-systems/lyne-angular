<!-- with radio button -->
<sbb-selection-expansion-panel [forceOpen]="controls.forceOpen().value()">
  <sbb-radio-button-panel
    [borderless]="controls.borderless().value()"
    [color]="controls.color().value()"
    [disabled]="controls.disabled().value()"
    [size]="controls.size().value()"
  >
    <sbb-card-badge>%</sbb-card-badge>
    Value
    <span slot="subtext">Subtext</span>
    <span slot="suffix" class="ticket-price">
      <sbb-icon name="diamond-small"></sbb-icon>
      <span class="sbb-text-xs sbb-text--bold">CHF</span>
      <span class="sbb-text-m sbb-text--bold">40.00</span>
    </span>
  </sbb-radio-button-panel>
  <div slot="content">Inner Content</div>
</sbb-selection-expansion-panel>

<br />

<!-- with checkbox -->
<sbb-selection-expansion-panel [forceOpen]="controls.forceOpen().value()">
  <sbb-checkbox-panel
    [borderless]="controls.borderless().value()"
    [color]="controls.color().value()"
    [disabled]="controls.disabled().value()"
    [size]="controls.size().value()"
  >
    <sbb-card-badge>%</sbb-card-badge>
    Value
    <span slot="subtext">Subtext</span>
    <span slot="suffix" class="ticket-price">
      <sbb-icon name="diamond-small"></sbb-icon>
      <span class="sbb-text-xs sbb-text--bold">CHF</span>
      <span class="sbb-text-m sbb-text--bold">40.00</span>
    </span>
  </sbb-checkbox-panel>
  <div slot="content">Inner Content</div>
</sbb-selection-expansion-panel>

<sbb-title level="5">Properties</sbb-title>
<div class="sbb-controls-table">
  <label for="forceOpen">Force open</label>
  <sbb-checkbox id="forceOpen" [formField]="controls.forceOpen"></sbb-checkbox>

  <label for="borderless">Borderless</label>
  <sbb-checkbox id="borderless" [formField]="controls.borderless"></sbb-checkbox>

  <label for="disabled">Disabled</label>
  <sbb-checkbox id="disabled" [formField]="controls.disabled"></sbb-checkbox>

  <label>Color</label>
  <sbb-radio-button-group aria-label="Color" [formField]="controls.color">
    <sbb-radio-button value="white">white</sbb-radio-button>
    <sbb-radio-button value="milk">milk</sbb-radio-button>
  </sbb-radio-button-group>

  <label>Size</label>
  <sbb-radio-button-group aria-label="Size" [formField]="controls.size" allowEmptySelection>
    <sbb-radio-button value="xs">xs</sbb-radio-button>
    <sbb-radio-button value="s">s</sbb-radio-button>
    <sbb-radio-button value="m">m</sbb-radio-button>
  </sbb-radio-button-group>
</div>
