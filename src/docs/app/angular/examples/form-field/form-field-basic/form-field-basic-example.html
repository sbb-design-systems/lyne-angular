<sbb-form-field
  [borderless]="controls.formField.borderless().value()"
  [floatingLabel]="controls.formField.floatingLabel().value()"
  [hiddenLabel]="controls.formField.hiddenLabel().value()"
  [size]="controls.formField.size().value()"
  [width]="controls.formField.width().value()!"
>
  <label>Example</label>
  <input
    required
    [disabled]="controls.input.disabled().value()"
    [readOnly]="controls.input.readonly().value()"
  />
  <sbb-error>This field is required!</sbb-error>
</sbb-form-field>

<div class="controls">
  <div>
    <sbb-title class="group-label" level="6">Form field</sbb-title>
    <sbb-checkbox-group orientation="vertical">
      <sbb-checkbox [formField]="controls.formField.borderless">Borderless</sbb-checkbox>
      <sbb-checkbox [formField]="controls.formField.floatingLabel">Floating label</sbb-checkbox>
      <sbb-checkbox [formField]="controls.formField.hiddenLabel">Hidden label</sbb-checkbox>
    </sbb-checkbox-group>
    Size
    <sbb-radio-button-group [formField]="controls.formField.size">
      <sbb-radio-button value="s">S</sbb-radio-button>
      <sbb-radio-button value="m">M</sbb-radio-button>
      <sbb-radio-button value="l">L</sbb-radio-button>
    </sbb-radio-button-group>
    Width
    <sbb-radio-button-group [formField]="controls.formField.width">
      <sbb-radio-button value="default">Default</sbb-radio-button>
      <sbb-radio-button value="collapse">Collapse</sbb-radio-button>
    </sbb-radio-button-group>
  </div>
  <div>
    <sbb-title class="group-label" level="6">Input</sbb-title>
    <sbb-checkbox-group orientation="vertical">
      <sbb-checkbox [formField]="controls.input.disabled">Disabled</sbb-checkbox>
      <sbb-checkbox [formField]="controls.input.readonly">Readonly</sbb-checkbox>
    </sbb-checkbox-group>
  </div>
</div>
