<sbb-form-field
  [borderless]="controls.formField.borderless().value()"
  [floatingLabel]="controls.formField.floatingLabel().value()"
  [hiddenLabel]="controls.formField.hiddenLabel().value()"
  [size]="controls.formField.size().value()"
  [width]="controls.formField.width().value()!"
>
  <label>Example</label>
  <input
    required
    [disabled]="controls.input.disabled().value()"
    [readOnly]="controls.input.readonly().value()"
  />
  <sbb-error>This field is required!</sbb-error>
</sbb-form-field>

<sbb-title level="5">Form field</sbb-title>
<div class="sbb-controls-table">
  <label for="borderless">Borderless</label>
  <sbb-checkbox-group>
    <sbb-checkbox id="borderless" [formField]="controls.formField.borderless"></sbb-checkbox>
  </sbb-checkbox-group>

  <label for="floatingLabel">Floating label</label>
  <sbb-checkbox-group>
    <sbb-checkbox id="floatingLabel" [formField]="controls.formField.floatingLabel"></sbb-checkbox>
  </sbb-checkbox-group>

  <label for="hiddenLabel">Hidden label</label>
  <sbb-checkbox-group>
    <sbb-checkbox id="hiddenLabel" [formField]="controls.formField.hiddenLabel"></sbb-checkbox>
  </sbb-checkbox-group>

  <label>Size</label>
  <sbb-radio-button-group aria-label="Size" [formField]="controls.formField.size">
    <sbb-radio-button value="s">S</sbb-radio-button>
    <sbb-radio-button value="m">M</sbb-radio-button>
    <sbb-radio-button value="l">L</sbb-radio-button>
  </sbb-radio-button-group>

  <label>Width</label>
  <sbb-radio-button-group aria-label="Width" [formField]="controls.formField.width">
    <sbb-radio-button value="default">Default</sbb-radio-button>
    <sbb-radio-button value="collapse">Collapse</sbb-radio-button>
  </sbb-radio-button-group>
</div>

<sbb-title level="5">Input</sbb-title>
<div class="sbb-controls-table">
  <label for="disabled">Disabled</label>
  <sbb-checkbox-group>
    <sbb-checkbox id="disabled" [formField]="controls.input.disabled"></sbb-checkbox>
  </sbb-checkbox-group>

  <label for="readonly">Readonly</label>
  <sbb-checkbox-group>
    <sbb-checkbox id="readonly" [formField]="controls.input.readonly"></sbb-checkbox>
  </sbb-checkbox-group>
</div>
