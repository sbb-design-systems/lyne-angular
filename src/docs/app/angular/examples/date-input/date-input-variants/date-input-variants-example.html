<sbb-form-field>
  <label>Date</label>
  <sbb-date-input
    [formControl]="form.controls.dateValue"
    [disabled]="form.controls.disabled.value!"
    [min]="form.controls.min.value"
    [max]="form.controls.max.value"
    [dateFilter]="form.controls.dateFilter.value!"
  ></sbb-date-input>
</sbb-form-field>

<sbb-title level="5">Properties</sbb-title>
<div class="sbb-controls-table">
  <label for="disabled">Disabled</label>
  <sbb-checkbox id="disabled" [formControl]="form.controls.disabled"></sbb-checkbox>

  <label>Date filter</label>
  <sbb-radio-button-group aria-label="Date filter" (change)="onChange($event)" allowEmptySelection>
    <sbb-radio-button value="odd">Exclude odd years</sbb-radio-button>
    <sbb-radio-button value="even">Exclude even years</sbb-radio-button>
  </sbb-radio-button-group>

  <label for="min">Min</label>
  <sbb-form-field>
    <sbb-date-input
      id="min"
      [formControl]="form.controls.min"
      [max]="form.controls.max.value"
    ></sbb-date-input>
  </sbb-form-field>

  <label for="max">Max</label>
  <sbb-form-field>
    <sbb-date-input
      id="max"
      [formControl]="form.controls.max"
      [min]="form.controls.min.value"
    ></sbb-date-input>
  </sbb-form-field>
</div>
