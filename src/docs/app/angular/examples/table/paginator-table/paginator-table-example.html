<sbb-table-wrapper>
  <table sbb-table [dataSource]="dataSource">
    <sbb-text-column name="position"></sbb-text-column>
    <sbb-text-column name="name"></sbb-text-column>
    <sbb-text-column name="power"></sbb-text-column>
    <sbb-text-column name="description"></sbb-text-column>

    <tr sbb-header-row *sbbHeaderRowDef="displayedColumns"></tr>
    <tr sbb-row *sbbRowDef="let row; columns: displayedColumns"></tr>
  </table>
</sbb-table-wrapper>

<sbb-paginator [pageSize]="form.pageSize().value()"></sbb-paginator>

<sbb-title level="5">Properties</sbb-title>
<div class="sbb-controls-table">
  <label for="pageSize">Page Size</label>
  <sbb-form-field id="pageSize">
    <input type="number" [formField]="form.pageSize" />
  </sbb-form-field>

  <label for="rowCount">Count of rows</label>
  <sbb-form-field id="rowCount">
    <input type="number" [formField]="form.rowCount" />
  </sbb-form-field>
</div>
