<sbb-form-field>
  <label>Autocomplete with group and hint</label>
  <input [formField]="control" />
  <sbb-autocomplete>
    @for (option of filteredOptions(); track option) {
      <sbb-option [value]="option">{{ option }}</sbb-option>
    }
    <sbb-optgroup label="Static Options">
      @for (option of staticOptions; track option) {
        <sbb-option [value]="option">{{ option }}</sbb-option>
      }
      <sbb-option-hint>Hint for option group</sbb-option-hint>
    </sbb-optgroup>
  </sbb-autocomplete>
</sbb-form-field>

<p>
  <sbb-card color="milk">
    Selected value: <code>{{ control().value() | json }}</code>
  </sbb-card>
</p>
