<sbb-form-field>
  <label>Autocomplete with signal form</label>
  <input [formField]="control" [sbbAutocomplete]="auto" />
  <sbb-autocomplete #auto="sbbAutocomplete" [displayWith]="displayWith">
    @for (option of filteredOptions(); track option) {
    <sbb-option [value]="option">{{ option.key }}</sbb-option>
    }
  </sbb-autocomplete>
</sbb-form-field>

<p>
  <sbb-card color="milk">Selected value: <code>{{ control().value() | json }}</code></sbb-card>
</p>
