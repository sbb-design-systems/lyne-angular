<sbb-form-field>
  <label>Basic Autocomplete</label>
  <input [formField]="control" />
  <sbb-autocomplete>
    @for (option of options; track option) {
    <sbb-option [value]="option">{{ option }}</sbb-option>
    }
  </sbb-autocomplete>
</sbb-form-field>

<p>
  <sbb-card color="milk">Selected value: <code>{{control().value() | json}}</code></sbb-card>
</p>
