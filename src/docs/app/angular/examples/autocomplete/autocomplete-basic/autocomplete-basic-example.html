<sbb-form-field>
  <label>Basic Autocomplete</label>
  <input [formField]="control" />
  <sbb-autocomplete>
    @for (option of options; track option) {
    <sbb-option [value]="option">{{ option }}</sbb-option>
    }
  </sbb-autocomplete>
</sbb-form-field>

<sbb-card class="form-box" color="milk"> {{ control.value | json }} </sbb-card>

<p>Selected Value: <code>{{control().value() | json}}</code></p>
