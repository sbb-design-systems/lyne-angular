<sbb-form-field>
  <label>Template-driven autocomplete</label>
  <input [(ngModel)]="value" [sbbAutocomplete]="auto" />
  <sbb-autocomplete #auto="sbbAutocomplete" [displayWith]="displayWith">
    @for (option of options; track option.id) {
    <sbb-option [value]="option">{{ option.value.prop }}</sbb-option>
    }
  </sbb-autocomplete>
</sbb-form-field>

<sbb-card class="form-box" color="milk"> {{ value | json }} </sbb-card>
