<sbb-secondary-button [sbbNavigation]="navigation">Open Navigation</sbb-secondary-button>

<sbb-navigation #navigation="sbbNavigation">
  <sbb-navigation-marker>
    <sbb-navigation-button aria-current="page" class="sbb-active">
      Tickets & Offers
    </sbb-navigation-button>
    <sbb-navigation-button>Vacations & Recreation</sbb-navigation-button>
    <sbb-navigation-button>Travel information</sbb-navigation-button>
    <sbb-navigation-link routerLink="./">Help & Contact</sbb-navigation-link>
  </sbb-navigation-marker>
  <sbb-navigation-marker size="s">
    @for (lang of languages; track lang) {
      <sbb-navigation-button
        [attr.aria-pressed]="language() === lang"
        [class.sbb-active]="language() === lang"
        (click)="language.set(lang)"
      >
        {{ lang }}
      </sbb-navigation-button>
    }
  </sbb-navigation-marker>
</sbb-navigation>
