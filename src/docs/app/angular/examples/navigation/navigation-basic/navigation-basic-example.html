<sbb-secondary-button #trigger>Open Navigation</sbb-secondary-button>

<sbb-navigation [trigger]="trigger">
  <sbb-navigation-marker>
    <sbb-navigation-button aria-current="page" class="sbb-active"
      >Tickets & Offers</sbb-navigation-button
    >
    <sbb-navigation-button>Vacations & Recreation</sbb-navigation-button>
    <sbb-navigation-button>Travel information</sbb-navigation-button>
    <sbb-navigation-link routerLink="./">Help & Contact</sbb-navigation-link>
  </sbb-navigation-marker>
  <sbb-navigation-marker size="s">
    <sbb-navigation-button aria-pressed="false">Deutsch</sbb-navigation-button>
    <sbb-navigation-button aria-pressed="false">Français</sbb-navigation-button>
    <sbb-navigation-button aria-pressed="true" class="sbb-active">Italiano</sbb-navigation-button>
    <sbb-navigation-button aria-pressed="false">English</sbb-navigation-button>
  </sbb-navigation-marker>
</sbb-navigation>
