<sbb-signet [protectiveRoom]="controls.protectiveRoom().value()"></sbb-signet>

<sbb-title level="5">Properties</sbb-title>
<div class="sbb-controls-table">
  <label>Protective room</label>
  <sbb-radio-button-group aria-label="Protective room" [formField]="controls.protectiveRoom">
    <sbb-radio-button value="none">none</sbb-radio-button>
    <sbb-radio-button value="minimal">minimal</sbb-radio-button>
    <sbb-radio-button value="ideal">ideal</sbb-radio-button>
  </sbb-radio-button-group>
</div>
