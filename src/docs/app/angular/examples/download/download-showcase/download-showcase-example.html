<sbb-download
  href="https://www.sbb.ch/anual-report.pdf"
  [color]="controls.color().value()"
  [label]="controls.label().value()"
  [iconName]="controls.iconName().value()"
>
  <sbb-download-info changed="2026-12-24" size="4096"></sbb-download-info>
</sbb-download>

<sbb-title level="5">Properties</sbb-title>
<div class="sbb-controls-table">
  <label>Color</label>
  <sbb-radio-button-group aria-label="Color" [formField]="controls.color">
    <sbb-radio-button value="white">white</sbb-radio-button>
    <sbb-radio-button value="milk">milk</sbb-radio-button>
  </sbb-radio-button-group>
  <label for="select">Icon Name</label>
  <sbb-form-field>
    <sbb-select id="select" [formField]="controls.iconName">
      <sbb-option value="">auto</sbb-option>
      <sbb-option value="document-pdf-small">document-pdf-small</sbb-option>
      <sbb-option value="document-xls-small">document-xls-small</sbb-option>
      <sbb-option value="document-ppt-small">document-ppt-small</sbb-option>
      <sbb-option value="document-doc-small">document-doc-small</sbb-option>
      <sbb-option value="document-zip-small">document-zip-small</sbb-option>
      <sbb-option value="document-image-small">document-image-small</sbb-option>
      <sbb-option value="document-standard-small">document-standard-small</sbb-option>
    </sbb-select>
  </sbb-form-field>
  <label for="label">Label</label>
  <sbb-form-field>
    <input id="label" [formField]="controls.label" />
  </sbb-form-field>
</div>
