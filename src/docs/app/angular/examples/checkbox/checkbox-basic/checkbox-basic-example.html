<sbb-checkbox
  [formField]="controls.model"
  [size]="controls.size().value()"
  [indeterminate]="controls.indeterminate().value()"
  [iconPlacement]="controls.iconPlacement().value()"
  iconName="tickets-class-small"
>
  Checkbox with Icon
</sbb-checkbox>

<p>
  <sbb-card color="milk">
    Value: <code>{{ controls.model().value() }}</code>
  </sbb-card>
</p>

<sbb-title level="5">Properties</sbb-title>
<div class="sbb-controls-table">
  <label>Size</label>
  <sbb-radio-button-group aria-label="Size" allowEmptySelection [formField]="controls.size">
    <sbb-radio-button value="xs">xs</sbb-radio-button>
    <sbb-radio-button value="s">s</sbb-radio-button>
    <sbb-radio-button value="m">m</sbb-radio-button>
  </sbb-radio-button-group>
  <label for="disabled">Disabled</label>
  <sbb-checkbox id="disabled" [formField]="controls.disabled"></sbb-checkbox>
  <label for="indeterminate">Indeterminate</label>
  <sbb-checkbox id="indeterminate" [formField]="controls.indeterminate"></sbb-checkbox>
  <label>Icon Placement</label>
  <sbb-radio-button-group aria-label="Icon Placement" [formField]="controls.iconPlacement">
    <sbb-radio-button value="start">start</sbb-radio-button>
    <sbb-radio-button value="end">end</sbb-radio-button>
  </sbb-radio-button-group>
</div>
