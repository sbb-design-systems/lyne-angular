<form (submit)="submitHandler($event)">
  <fieldset>
    <legend class="sbb-text-s">&nbsp;fieldset&nbsp;</legend>
    <sbb-checkbox
      [value]="controls.fieldValue().value()"
      [name]="controls.fieldName().value()"
    ></sbb-checkbox>
  </fieldset>

  <fieldset disabled>
    <legend class="sbb-text-s">&nbsp;disabled fieldset&nbsp;</legend>
    <sbb-checkbox></sbb-checkbox>
  </fieldset>

  <div style="margin-block: var(--sbb-spacing-responsive-s)">
    <sbb-secondary-button type="reset">Reset</sbb-secondary-button>
    <sbb-button type="submit">Submit</sbb-button>
  </div>

  <p class="sbb-text-s">
    Form-Data after click submit:

    <sbb-card color="milk" id="form-data">
      <code>{{ formData }}</code>
    </sbb-card>
  </p>
</form>

<sbb-title level="5">Form Controls</sbb-title>
<div class="sbb-controls-table">
  <label>Name</label>
  <sbb-form-field size="s">
    <input type="text" [formField]="controls.fieldName" />
  </sbb-form-field>
  <label>Value</label>
  <sbb-form-field size="s">
    <input type="text" [formField]="controls.fieldValue" />
  </sbb-form-field>
</div>
