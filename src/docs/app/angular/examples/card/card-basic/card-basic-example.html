<sbb-card
  [color]="controls.color().value()"
  [class]="controls.spacing().value() ? `sbb-card-spacing-${controls.spacing().value()}` : ''"
>
  <sbb-card-badge
    [color]="controls.badgeColor().value()"
    aria-label="Super saver sales ticket price starts at CHF 92.50"
  >
    % from CHF 92.50
  </sbb-card-badge>
  <sbb-title level="4">Example title</sbb-title>
  Card content
</sbb-card>

<sbb-title level="5">Properties</sbb-title>
<div class="sbb-controls-table">
  <label for="color">Color</label>
  <sbb-radio-button-group id="color" size="s" [formField]="controls.color">
    <sbb-radio-button value="white">white (default)</sbb-radio-button>
    <sbb-radio-button value="milk">milk</sbb-radio-button>
    <sbb-radio-button value="transparent-bordered">transparent-bordered</sbb-radio-button>
    <sbb-radio-button value="transparent-bordered-dashed"
      >transparent-bordered-dashed</sbb-radio-button
    >
  </sbb-radio-button-group>

  <label for="spacing">Spacing</label>
  <sbb-radio-button-group
    id="spacing"
    size="s"
    [formField]="controls.spacing"
    [allowEmptySelection]="true"
  >
    <sbb-radio-button value="3x-xxs">3x-xxs</sbb-radio-button>
    <sbb-radio-button value="xxxs-xxs">xxxs-xxs</sbb-radio-button>
    <sbb-radio-button value="xxxs-s">xxxs-s</sbb-radio-button>
    <sbb-radio-button value="4x-xxs">4x-xxs</sbb-radio-button>
    <sbb-radio-button value="xxs">xxs</sbb-radio-button>
    <sbb-radio-button value="s">s</sbb-radio-button>
    <sbb-radio-button value="l">l</sbb-radio-button>
  </sbb-radio-button-group>

  <label for="badge-color">Badge color</label>
  <sbb-radio-button-group id="badge-color" size="s" [formField]="controls.badgeColor">
    <sbb-radio-button value="charcoal">charcoal</sbb-radio-button>
    <sbb-radio-button value="white">white</sbb-radio-button>
  </sbb-radio-button-group>
</div>
