<sbb-calendar
  [formField]="form.calendar"
  [orientation]="controls.orientation().value()"
  [view]="controls.view().value()"
  [weekNumbers]="controls.weekNumbers().value()"
  [multiple]="controls.multiple().value()"
></sbb-calendar>

<p>
  <sbb-card color="milk"
    >Value: <code>{{ stringifiedValue() }}</code></sbb-card
  >
</p>

<sbb-title level="5">Properties</sbb-title>
<div class="sbb-controls-table">
  <label for="weekNumbers">Week numbers</label>
  <sbb-checkbox id="weekNumbers" [formField]="controls.weekNumbers"></sbb-checkbox>

  <label for="multiple">Multiple</label>
  <sbb-checkbox id="multiple" [formField]="controls.multiple"></sbb-checkbox>

  <label>Orientation</label>
  <sbb-radio-button-group aria-label="Orientation" [formField]="controls.orientation">
    <sbb-radio-button value="horizontal">Horizontal</sbb-radio-button>
    <sbb-radio-button value="vertical">Vertical</sbb-radio-button>
  </sbb-radio-button-group>

  <label>View</label>
  <sbb-radio-button-group aria-label="View" [formField]="controls.view">
    <sbb-radio-button value="day">Day</sbb-radio-button>
    <sbb-radio-button value="month">Month</sbb-radio-button>
    <sbb-radio-button value="year">Year</sbb-radio-button>
  </sbb-radio-button-group>
</div>
