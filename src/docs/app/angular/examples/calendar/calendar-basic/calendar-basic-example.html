<sbb-calendar
  [formField]="form.calendar"
  [orientation]="controls.orientation().value()"
  [view]="controls.view().value()"
  [weekNumbers]="controls.weekNumbers().value()"
  [multiple]="controls.multiple().value()"
></sbb-calendar>

<p>
  <sbb-card color="milk">Value: <code>{{ form.calendar().value().toDateString() }}</code></sbb-card>
</p>

<sbb-title class="group-label" level="5">Calendar</sbb-title>
<sbb-action-group>
  <sbb-checkbox-group orientation="vertical">
    <sbb-checkbox [formField]="controls.weekNumbers">Week numbers</sbb-checkbox>
    <sbb-checkbox [formField]="controls.multiple">Multiple</sbb-checkbox>
  </sbb-checkbox-group>
  <sbb-radio-button-group [formField]="controls.orientation" orientation="vertical">
    <label>Orientation</label>
    <sbb-radio-button value="horizontal">Horizontal</sbb-radio-button>
    <sbb-radio-button value="vertical">Vertical</sbb-radio-button>
  </sbb-radio-button-group>
  <sbb-radio-button-group [formField]="controls.view" orientation="vertical">
    <label>View</label>
    <sbb-radio-button value="day">Day</sbb-radio-button>
    <sbb-radio-button value="month">Month</sbb-radio-button>
    <sbb-radio-button value="year">Year</sbb-radio-button>
  </sbb-radio-button-group>
</sbb-action-group>
