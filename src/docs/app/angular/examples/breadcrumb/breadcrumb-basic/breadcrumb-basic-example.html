<sbb-breadcrumb [href]="externalLink()" [iconName]="iconName()" [target]="targetBlank()"
  >Single breadcrumb
</sbb-breadcrumb>

<sbb-title level="5">Properties</sbb-title>
<form [formGroup]="form" class="controls">
  <sbb-radio-button-group orientation="vertical" formControlName="iconName">
    <label>Icon</label>
    <sbb-radio-button value="">none</sbb-radio-button>
    <sbb-radio-button value="house-small">house</sbb-radio-button>
    <sbb-radio-button value="download-small">download</sbb-radio-button>
    <sbb-radio-button value="pie-small">pie</sbb-radio-button>
  </sbb-radio-button-group>
  <sbb-checkbox-group orientation="vertical">
    <sbb-checkbox formControlName="targetBlank">Open in new window</sbb-checkbox>
    <sbb-checkbox formControlName="externalLink">External href</sbb-checkbox>
  </sbb-checkbox-group>
</form>
