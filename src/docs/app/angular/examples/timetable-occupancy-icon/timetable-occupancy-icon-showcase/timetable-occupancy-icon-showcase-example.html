<div [class.sbb-example-negative]="controls.negative().value()">
  <sbb-timetable-occupancy-icon
    [occupancy]="controls.occupancy().value()"
    [negative]="controls.negative().value()"
  ></sbb-timetable-occupancy-icon>
</div>

<sbb-title level="5">Properties</sbb-title>
<div class="sbb-controls-table">
  <label>Occupancy</label>
  <sbb-radio-button-group aria-label="Occupancy" [formField]="controls.occupancy">
    <sbb-radio-button value="none">None</sbb-radio-button>
    <sbb-radio-button value="low">Low</sbb-radio-button>
    <sbb-radio-button value="medium">Medium</sbb-radio-button>
    <sbb-radio-button value="high">High</sbb-radio-button>
  </sbb-radio-button-group>

  <label for="negative">Negative</label>
  <sbb-checkbox id="negative" [formField]="controls.negative"></sbb-checkbox>
</div>
