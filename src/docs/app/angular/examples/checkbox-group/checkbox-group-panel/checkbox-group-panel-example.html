<sbb-checkbox-group
  [orientation]="controls.orientation().value()"
  [size]="controls.size().value()"
  [horizontalFrom]="controls.horizontalFrom().value()"
>
  <sbb-checkbox-panel checked
    >Label 1
    <span slot="subtext">Subtext</span>
    <span class="suffix" slot="suffix">
      <sbb-icon name="diamond-small" class="diamond-icon"></sbb-icon>
      <span class="sbb-text-m sbb-text--bold">CHF 40.00</span>
    </span>
    <sbb-card-badge>%</sbb-card-badge>
  </sbb-checkbox-panel>
  <sbb-checkbox-panel
    >Label 2
    <span slot="subtext">Subtext</span>
    <span class="suffix" slot="suffix">
      <sbb-icon name="diamond-small" class="diamond-icon"></sbb-icon>
      <span class="sbb-text-m sbb-text--bold">CHF 40.00</span>
    </span>
    <sbb-card-badge>%</sbb-card-badge>
  </sbb-checkbox-panel>
  <sbb-checkbox-panel
    >Label 3
    <span slot="subtext">Subtext</span>
    <span class="suffix" slot="suffix">
      <sbb-icon name="diamond-small" class="diamond-icon"></sbb-icon>
      <span class="sbb-text-m sbb-text--bold">CHF 40.00</span>
    </span>
    <sbb-card-badge>%</sbb-card-badge>
  </sbb-checkbox-panel>
</sbb-checkbox-group>
<sbb-title level="5">Properties</sbb-title>
<div class="sbb-controls-table">
  <label>Orientation</label>
  <sbb-radio-button-group
    aria-label="Orientation"
    allowEmptySelection
    [formField]="controls.orientation"
  >
    <sbb-radio-button value="horizontal">Horizontal</sbb-radio-button>
    <sbb-radio-button value="vertical">Vertical</sbb-radio-button>
  </sbb-radio-button-group>
  <label>Size</label>
  <sbb-radio-button-group aria-label="Size" [formField]="controls.size">
    <sbb-radio-button value="xs">xs</sbb-radio-button>
    <sbb-radio-button value="s">s</sbb-radio-button>
    <sbb-radio-button value="m">m</sbb-radio-button>
  </sbb-radio-button-group>
  <label>Horizontal From</label>
  <sbb-form-field size="s" type="select">
    <sbb-select [formField]="controls.horizontalFrom">
      <sbb-option [value]="null">unset</sbb-option>
      <sbb-option value="zero">zero</sbb-option>
      <sbb-option value="small">small</sbb-option>
      <sbb-option value="large">large</sbb-option>
      <sbb-option value="ultra">ultra</sbb-option>
    </sbb-select>
  </sbb-form-field>
</div>
