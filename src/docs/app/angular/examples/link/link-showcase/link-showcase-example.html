<div class="wrapper" [class.sbb-example-negative]="controls.negative().value()">
  <p>
    <sbb-link href="https://www.sbb.ch" target="_blank" [negative]="controls.negative().value()">
      Link
    </sbb-link>
  </p>
  <p>
    <sbb-link-button href="https://www.sbb.ch" [negative]="controls.negative().value()">
      Link button
    </sbb-link-button>
  </p>
  <p>
    <sbb-link-static href="https://www.sbb.ch" [negative]="controls.negative().value()">
      Link static
    </sbb-link-static>
  </p>
</div>

<sbb-title level="5">Properties</sbb-title>
<div class="sbb-controls-table">
  <label for="negative">Negative</label>
  <sbb-checkbox id="negative" [formField]="controls.negative"></sbb-checkbox>
</div>
