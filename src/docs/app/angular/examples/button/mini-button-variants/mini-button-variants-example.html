<div>
  <p>Standalone</p>
  <sbb-mini-button [disabled]="disabled()" [iconName]="icon() ? 'pen-small' : ''">
    {{ label() ? 'mini-button text' : null }}
  </sbb-mini-button>
</div>
<div>
  <p>Form field</p>
  <sbb-form-field>
    <input />
    <sbb-mini-button slot="prefix" iconName="circle-information-small"></sbb-mini-button>
    @if (icon()) {
    <sbb-mini-button slot="suffix" iconName="pen-small" [disabled]="disabled()"></sbb-mini-button>
    }
  </sbb-form-field>
</div>
<sbb-title level="5">Properties</sbb-title>
<form [formGroup]="form">
  <sbb-checkbox-group orientation="vertical">
    <sbb-checkbox formControlName="disabled">Disabled</sbb-checkbox>
    <sbb-checkbox formControlName="label">Label</sbb-checkbox>
    <sbb-checkbox formControlName="icon">Icon</sbb-checkbox>
  </sbb-checkbox-group>
</form>
