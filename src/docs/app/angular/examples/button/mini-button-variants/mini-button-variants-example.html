<div>
  <p>Standalone</p>
  <sbb-mini-button
    [disabled]="controls.disabled().value()"
    [iconName]="controls.icon().value() ? 'pen-small' : ''"
  >
    {{ controls.label().value() ? 'mini-button text' : null }}
  </sbb-mini-button>
</div>
<div>
  <p>Form field</p>
  <sbb-form-field>
    <input />
    <sbb-mini-button slot="prefix" iconName="circle-information-small"></sbb-mini-button>
    @if (controls.icon().value()) {
    <sbb-mini-button
      slot="suffix"
      iconName="pen-small"
      [disabled]="controls.disabled().value()"
    ></sbb-mini-button>
    }
  </sbb-form-field>
</div>

<sbb-title level="5">Properties</sbb-title>
<div class="sbb-controls-table">
  <label for="disabled">Disabled</label>
  <sbb-checkbox id="disabled" [formField]="controls.disabled"></sbb-checkbox>

  <label for="label">Label</label>
  <sbb-checkbox id="label" [formField]="controls.label"></sbb-checkbox>

  <label for="icon">Icon</label>
  <sbb-checkbox id="icon" [formField]="controls.icon"></sbb-checkbox>
</div>
