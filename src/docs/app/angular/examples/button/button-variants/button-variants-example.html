<p>
  <sbb-button
    [disabled]="disabled()"
    [loading]="loading()"
    [iconName]="icon() ? 'pie-small' : ''"
    [size]="size()"
  >
    {{ label() ? 'Button text' : null }}
  </sbb-button>
</p>
<p>
  <sbb-secondary-button
    [disabled]="disabled()"
    [loading]="loading()"
    [iconName]="icon() ? 'dog-small' : ''"
    [size]="size()"
  >
    {{ label() ? 'Button text' : null }}
  </sbb-secondary-button>
</p>
<p>
  <sbb-accent-button
    [disabled]="disabled()"
    [loading]="loading()"
    [iconName]="icon() ? 'croissant-small' : ''"
    [size]="size()"
  >
    {{ label() ? 'Button text' : null }}
  </sbb-accent-button>
</p>
<p>
  <sbb-transparent-button
    [disabled]="disabled()"
    [loading]="loading()"
    [iconName]="icon() ? 'diamond-small' : ''"
    [size]="size()"
  >
    {{ label() ? 'Button text' : null }}
  </sbb-transparent-button>
</p>

<sbb-title level="5">Properties</sbb-title>
<form [formGroup]="form" style="display: flex; gap: var(--sbb-spacing-fixed-8x)">
  <sbb-radio-button-group formControlName="size" orientation="vertical">
    <label>Size</label>
    <sbb-radio-button value="s">'s'</sbb-radio-button>
    <sbb-radio-button value="m">'m'</sbb-radio-button>
    <sbb-radio-button value="l">'l'</sbb-radio-button>
  </sbb-radio-button-group>
  <sbb-checkbox-group orientation="vertical">
    <sbb-checkbox formControlName="disabled">Disabled</sbb-checkbox>
    <sbb-checkbox formControlName="loading">Loading</sbb-checkbox>
    <sbb-checkbox formControlName="label">Label</sbb-checkbox>
    <sbb-checkbox formControlName="icon">Icon</sbb-checkbox>
  </sbb-checkbox-group>
</form>
