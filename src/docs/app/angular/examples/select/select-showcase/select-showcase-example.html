<div [class.sbb-example-negative]="controls.negative().value()">
  <sbb-form-field
    [size]="controls.size().value()"
    [borderless]="controls.borderless().value()"
    [negative]="controls.negative().value()"
  >
    <label>Label</label>
    <sbb-select
      [formField]="form.select"
      [multiple]="controls.multiple().value()"
      [disabled]="controls.disabled().value()"
      [readOnly]="controls.readOnly().value()"
    >
      <sbb-option value="Astoro">Astoro</sbb-option>
      <sbb-option value="Flirt">Flirt</sbb-option>
      <sbb-option value="Domino">Domino</sbb-option>
    </sbb-select>
  </sbb-form-field>
</div>

<p>
  <sbb-card color="milk">
    Value: <code> {{ form.select().value() | json }} </code>
  </sbb-card>
</p>
<sbb-title level="5">Properties</sbb-title>
<div class="sbb-controls-table">
  <label for="multiple">Multiple</label>
  <sbb-checkbox id="multiple" [formField]="controls.multiple"></sbb-checkbox>

  <label for="disabled">Disabled</label>
  <sbb-checkbox id="disabled" [formField]="controls.disabled"></sbb-checkbox>

  <label for="readOnly">Readonly</label>
  <sbb-checkbox id="readOnly" [formField]="controls.readOnly"></sbb-checkbox>

  <label for="negative">Negative</label>
  <sbb-checkbox id="negative" [formField]="controls.negative"></sbb-checkbox>

  <label for="borderless">Borderless</label>
  <sbb-checkbox id="borderless" [formField]="controls.borderless"></sbb-checkbox>

  <label>Size</label>
  <sbb-radio-button-group aria-label="Size" [formField]="controls.size" allowEmptySelection>
    <sbb-radio-button value="s">s</sbb-radio-button>
    <sbb-radio-button value="m">m</sbb-radio-button>
  </sbb-radio-button-group>
</div>
