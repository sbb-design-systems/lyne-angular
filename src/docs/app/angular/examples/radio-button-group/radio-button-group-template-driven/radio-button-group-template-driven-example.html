<sbb-radio-button-group aria-label="Radio group label" [(ngModel)]="model">
  <sbb-radio-button value="1">Option one</sbb-radio-button>
  <sbb-radio-button value="2">Option two</sbb-radio-button>
  <sbb-radio-button value="3">Option three</sbb-radio-button>
</sbb-radio-button-group>

<p>
  <sbb-card color="milk">
    Value: <code>{{ model }}</code>
  </sbb-card>
</p>
