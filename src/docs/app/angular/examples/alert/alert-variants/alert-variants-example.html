<sbb-alert
  [readOnly]="controls.readOnly().value()"
  [size]="controls.size().value()"
  [iconName]="controls.iconName().value()"
>
  <sbb-title level="3">Interruption between Berne and Olten</sbb-title>
  Between Bern and Olten from 03.11.2021 to 05.12.2022 each time from 22:30 to 06:00 o'clock
  construction work will take place. You have to expect changed travel times and changed
  connections.
  <sbb-link href="https://www.sbb.ch">Find out more</sbb-link>
</sbb-alert>

<sbb-title level="5">Properties</sbb-title>
<div class="sbb-controls-table">
  <label>Size</label>
  <sbb-radio-button-group aria-label="Size" [formField]="controls.size" allowEmptySelection>
    <sbb-radio-button value="s">s</sbb-radio-button>
    <sbb-radio-button value="m">m</sbb-radio-button>
    <sbb-radio-button value="l">l</sbb-radio-button>
  </sbb-radio-button-group>

  <label>Icon</label>
  <sbb-radio-button-group aria-label="Icon" [formField]="controls.iconName" allowEmptySelection>
    <sbb-radio-button [value]="null">info (default)</sbb-radio-button>
    <sbb-radio-button value="attention">attention</sbb-radio-button>
    <sbb-radio-button value="disruption">disruption</sbb-radio-button>
  </sbb-radio-button-group>

  <label for="readonly">Readonly</label>
  <sbb-checkbox id="readonly" [formField]="controls.readOnly"></sbb-checkbox>
</div>
