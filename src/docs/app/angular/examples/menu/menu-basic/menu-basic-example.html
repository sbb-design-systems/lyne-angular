<!-- Trigger element -->
<sbb-button [sbbMenuTrigger]="menu">Menu trigger</sbb-button>

<!-- Menu component with menu actions -->
<sbb-menu #menu="sbbMenu">
  <sbb-menu-link iconName="link-small" href="https://www.sbb.ch/en">View</sbb-menu-link>
  <sbb-menu-button iconName="pen-small">Edit</sbb-menu-button>
  <sbb-menu-button
    iconName="swisspass-small"
    sbb-badge="12"
    aria-label="Details, containing 12 items"
  >
    Details
  </sbb-menu-button>
  <sbb-divider></sbb-divider>
  <sbb-menu-button iconName="cross-small">Cancel</sbb-menu-button>
</sbb-menu>
