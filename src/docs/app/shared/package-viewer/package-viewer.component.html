<sbb-sidebar-container>
  <sbb-sidebar role="navigation" opened>
    <sbb-sidebar-title>
      <sbb-form-field floatingLabel class="search-form-field">
        <label>Search Components</label>
        <sbb-icon name="magnifying-glass-small" slot="prefix"></sbb-icon>
        <input [formControl]="searchControl" />
        <sbb-form-field-clear></sbb-form-field-clear> </sbb-form-field
    ></sbb-sidebar-title>

    @for (section of filteredSections(); track section.name) {
      <sbb-title visualLevel="4">{{ section.name }}</sbb-title>
      @for (entry of section.entries; track entry.label) {
        <sbb-block-link [routerLink]="entry.link" routerLinkActive="sbb-active">{{
          entry.label
        }}</sbb-block-link>
      }
    }
  </sbb-sidebar>
  <sbb-sidebar-content role="main" sbb-header-scroll-origin class="package-content">
    <router-outlet />
  </sbb-sidebar-content>
</sbb-sidebar-container>
