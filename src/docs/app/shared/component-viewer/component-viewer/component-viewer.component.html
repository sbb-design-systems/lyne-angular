<sbb-title level="1">{{ title() }}</sbb-title>
<sbb-tab-nav-bar>
  @for (section of sections; track $index) {
    <a
      [routerLink]="['.', section.toLowerCase()]"
      routerLinkActive="sbb-active"
      [routerLinkActiveOptions]="{ exact: true }"
    >
      {{ section }}
    </a>
  }
</sbb-tab-nav-bar>

<router-outlet></router-outlet>
