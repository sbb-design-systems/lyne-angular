<sbb-title level="4" class="example-viewer-title" [id]="exampleData().id">
  <sbb-link [href]="currentPath + '#' + exampleData().id" class="docs-link">
    {{ exampleData().description }}
  </sbb-link>
</sbb-title>

<div class="example">
  <div class="container">
    <div class="outlet-container">
      <sbb-example-outlet [exampleData]="exampleData()" />
    </div>

    <sbb-notification class="fullscreen-only-warning" animation="none" type="info" readonly>
      This example is only available in fullscreen mode or on StackBlitz. Click one of the buttons
      below.
    </sbb-notification>

    <sbb-tab-group [hidden]="!showSource()" class="sbb-example-viewer-tabs">
      @for (content of exampleCodes(); track $index) {
        <sbb-tab-label [active]="$index === 0">{{ content.label }}</sbb-tab-label>
        <sbb-tab [innerHtml]="content.code"> </sbb-tab>
      }
    </sbb-tab-group>
  </div>
  <div class="tools container">
    <sbb-secondary-button-link
      iconName="fullscreen-small"
      [routerLink]="[
        '/fullscreen-example',
        moduleParams()?.packageName,
        moduleParams()?.id,
        exampleData()?.id,
      ]"
      aria-label="View in fullscreen mode"
    >
      Fullscreen
    </sbb-secondary-button-link>

    @if (stackBlitzEnabled() && exampleData()) {
      <sbb-secondary-button
        sbb-stack-blitz-button
        [exampleData]="exampleData()"
        iconName="link-external-small"
        aria-label="Edit in StackBlitz"
      >
        StackBlitz
      </sbb-secondary-button>
    }

    <sbb-toggle-check #codeToggle (change)="showSource.set(codeToggle.checked)">
      View code
    </sbb-toggle-check>
  </div>
</div>
