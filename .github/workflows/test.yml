name: Test
on: [push, pull_request]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions: read-all

jobs:
  test:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.61.1-noble
      options: --user 1001
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: yarn
      - run: yarn install --frozen-lockfile --non-interactive
      - name: Create search keywords
        run: yarn run-s generate-keywords
      - name: Run tests
        run: yarn ng test -c ci
        env:
          NODE_ENV: production
      - name: Run schematic tests
        run: yarn test:angular-schematics
        env:
          NODE_ENV: production
      - name: Assert no new snapshots (run `yarn build && ng test -c ci` if this fails)
        run: git diff --exit-code
